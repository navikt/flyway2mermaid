name: "flyway2mermaid"
description: "Generate a Mermaid ER diagram from Flyway SQL migrations"

inputs:
  migrations:
    description: "Path to directory containing Flyway migration SQL files"
    required: true
  output:
    description: "Output file path"
    required: false
    default: "docs/schema.mmd"

outputs:
  diagram:
    description: "Path to the generated diagram file"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Build flyway2mermaid
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm ci --ignore-scripts
        npm run build

    - name: Generate diagram
      shell: bash
      run: |
        mkdir -p "$(dirname "${{ inputs.output }}")"
        node ${{ github.action_path }}/dist/cli.js "${{ inputs.migrations }}" -o "${{ inputs.output }}"

    - name: Upload diagram
      uses: actions/upload-artifact@v6
      with:
        name: er-diagram
        path: ${{ inputs.output }}
